<h2 id="安装">安装</h2><p><strong>windows</strong></p>
<ol>
<li><a href="http://sourceforge.net/projects/monaserver/files/MonaServer_Windows_32.zip/download" target="_blank" rel="external">点击下载运行包</a></li>
