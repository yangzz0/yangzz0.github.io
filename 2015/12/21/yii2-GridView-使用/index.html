<h2 id="GridView是什么？能做什么？">GridView是什么？能做什么？</h2><p><code>GridView</code>是一个用于把数据显示在一个表格中的<code>yii2</code> <code>widget</code></p>
<p>提供的功能，主要包括下面几种对数据的操作</p>
<ul>
<li>使用表格显示数据</li>
<li>对表格中的列进行<code>排序</code>显示</li>
<li><code>分页</code>显示数据</li>
<li><code>过滤</code>显示那些数据</li>
</ul>
